<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --sidebar: #161b22;
    --card: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 56px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; flex-shrink: 0; }
  .nav-btn { width: 40px; height: 40px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; position: relative; }
  .nav-btn:hover { background: var(--card); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: white; }
  .nav-btn .tooltip { position: absolute; left: 52px; background: var(--card); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 12px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; color: var(--text); }
  .nav-btn:hover .tooltip { opacity: 1; }
  .nav-spacer { flex: 1; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Views */
  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  /* Header */
  .view-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .view-title { font-size: 16px; font-weight: 600; }
  .view-subtitle { font-size: 13px; color: var(--muted); }

  /* Chat */
  #chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .msg { display: flex; gap: 12px; max-width: 860px; width: 100%; }
  .msg.user { flex-direction: row-reverse; margin-left: auto; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg.user .msg-avatar { background: var(--accent); }
  .msg.assistant .msg-avatar { background: #238636; }
  .msg-bubble { padding: 12px 16px; border-radius: 12px; max-width: calc(100% - 44px); font-size: 14px; line-height: 1.6; }
  .msg.user .msg-bubble { background: var(--accent); color: white; border-radius: 12px 4px 12px 12px; }
  .msg.assistant .msg-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; }
  .msg-bubble pre { background: #0d1117; border-radius: 6px; padding: 12px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
  .msg-bubble code:not(pre code) { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; font-size: 13px; }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 8px 0 8px 20px; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 6px; font-weight: 600; }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg-bubble th { background: rgba(255,255,255,0.05); }

  .typing-dot { display: inline-block; width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0; }
  #chat-input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; outline: none; font-family: inherit; line-height: 1.5; }
  #chat-input:focus { border-color: var(--accent); }
  .send-btn { background: var(--accent); color: white; border: none; border-radius: 8px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* Dashboard */
  .dashboard-grid { display: flex; gap: 10px; padding: 12px 24px 0; overflow-x: auto; flex-shrink: 0; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; white-space: nowrap; flex-shrink: 0; }
  .stat-icon { font-size: 18px; }
  .stat-value { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .stat-sub { font-size: 11px; color: var(--muted); }
  .dashboard-body { flex: 1; overflow: hidden; display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 14px 24px 20px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; overflow-y: auto; }
  .panel.focus-panel { display: flex; flex-direction: column; overflow: hidden; }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .focus-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 2px; }

  /* Focus cards */
  .focus-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s; }
  .focus-card:hover { border-color: var(--accent); }
  .focus-card.priority-urgent { border-left: 3px solid var(--red); }
  .focus-card.priority-normal { border-left: 3px solid var(--yellow); }
  .focus-card.priority-waiting { border-left: 3px solid var(--muted); }
  .focus-card-title { font-size: 14px; font-weight: 500; line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
  .focus-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .focus-tag { display: inline-flex; align-items: center; gap: 3px; padding: 1px 7px; border-radius: 10px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }
  .focus-tag.tag-ddl { border-color: rgba(248,81,73,0.4); color: var(--red); }
  .focus-tag.tag-project { border-color: rgba(88,166,255,0.4); color: var(--accent); }
  .focus-tag.tag-email { border-color: rgba(88,166,255,0.3); color: var(--accent); }
  .focus-tag.tag-wechat { border-color: rgba(63,185,80,0.3); color: var(--green); }
  .focus-card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .fc-btn { padding: 3px 9px; border-radius: 5px; font-size: 11px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.1s; }
  .fc-btn:hover { background: var(--card); color: var(--text); }
  .fc-btn.ai { border-color: rgba(188,140,255,0.4); color: #bc8cff; }
  .fc-btn.ai:hover { background: rgba(188,140,255,0.1); }
  .fc-btn.reply { border-color: rgba(88,166,255,0.4); color: var(--accent); }
  .fc-btn.reply:hover { background: rgba(88,166,255,0.1); }
  .fc-btn.done { border-color: rgba(63,185,80,0.4); color: var(--green); }
  .fc-btn.done:hover { background: rgba(63,185,80,0.1); }
  .fc-btn.del { border-color: rgba(248,81,73,0.3); color: var(--red); }
  .fc-btn.del:hover { background: rgba(248,81,73,0.1); }
  .focus-expand { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
  .focus-expand.open { display: block; }
  .focus-raw { font-size: 11px; color: var(--muted); font-family: monospace; background: var(--sidebar); padding: 6px 8px; border-radius: 4px; margin-bottom: 8px; word-break: break-all; }
  .focus-ai-text { font-size: 13px; line-height: 1.6; color: var(--text); }
  .sidebar-panel { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

  /* email items in sidebar */
  .email-sidebar-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .email-sidebar-item:last-child { border-bottom: none; }
  .focus-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
  .focus-item:last-child { border-bottom: none; }

  /* Memory */
  .memory-layout { display: flex; flex: 1; overflow: hidden; }
  .memory-tree { width: 240px; border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; flex-shrink: 0; }
  .tree-item { padding: 5px 8px 5px 8px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; color: var(--muted); border-radius: 4px; margin: 1px 6px; }
  .tree-item:hover { background: var(--card); color: var(--text); }
  .tree-item.active { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
  .tree-folder { font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text); font-weight: 600; padding: 6px 8px; border-radius: 4px; margin: 2px 6px; }
  .tree-folder:hover { background: var(--card); }
  .tree-folder-children { overflow: hidden; transition: max-height 0.2s ease; }
  .tree-folder-children.collapsed { display: none; }
  .memory-content { flex: 1; overflow-y: auto; padding: 24px; }
  .md-content { font-size: 14px; line-height: 1.7; max-width: 800px; }
  .md-content h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
  .md-content h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: var(--accent); }
  .md-content h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; }
  .md-content p { margin-bottom: 10px; color: var(--text); }
  .md-content ul, .md-content ol { margin: 8px 0 8px 20px; }
  .md-content li { margin-bottom: 4px; color: var(--text); }
  .md-content code { background: var(--card); padding: 2px 5px; border-radius: 4px; font-size: 13px; }
  .md-content pre { background: #0d1117; border-radius: 8px; padding: 14px; margin: 12px 0; overflow-x: auto; }
  .md-content blockquote { border-left: 3px solid var(--border); padding: 4px 16px; color: var(--muted); margin: 10px 0; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .md-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 12px; }
  .md-content th { background: var(--card); }

  /* Emails */
  .email-layout { display: flex; flex: 1; overflow: hidden; }
  .email-list { width: 340px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .email-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .email-item:hover { background: var(--card); }
  .email-item.active { background: rgba(88,166,255,0.1); border-left: 3px solid var(--accent); }
  .email-sender { font-size: 13px; font-weight: 600; }
  .email-subject { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .email-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; }
  .badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-imp1 { background: rgba(139,148,158,0.2); color: var(--muted); }
  .badge-imp2 { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .badge-imp3 { background: rgba(248,81,73,0.2); color: var(--red); }
  .email-detail { flex: 1; overflow-y: auto; padding: 24px; }
  .email-detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

  /* Search */
  .search-container { flex: 1; overflow-y: auto; padding: 24px; }
  .search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
  #search-input { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 16px; font-size: 14px; outline: none; }
  #search-input:focus { border-color: var(--accent); }
  .search-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
  .result-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .result-item:hover { border-color: var(--accent); }
  .result-source { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .result-title { font-size: 14px; font-weight: 600; }
  .result-snippet { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Misc */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.85; color: white; }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .loader { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .tag { display: inline-flex; padding: 2px 8px; border-radius: 12px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }

  /* Settings */
  .settings-layout { flex: 1; overflow-y: auto; padding: 24px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 960px; }
  .settings-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .settings-section.full-width { grid-column: 1 / -1; }
  .settings-section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 16px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; flex: 1; }
  .settings-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .settings-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 13px; width: 140px; outline: none; }
  .settings-input:focus { border-color: var(--accent); }
  .settings-input.wide { width: 240px; }
  .settings-toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .settings-toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: 0.2s; }
  .toggle-slider::before { content:''; position:absolute; width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s; }
  .settings-toggle input:checked + .toggle-slider { background: var(--accent); }
  .settings-toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
  .scan-root-list { margin-bottom: 12px; }
  .scan-root-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .scan-root-item:last-child { border-bottom: none; }
  .scan-root-path { flex: 1; color: var(--text); font-family: monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
  .scan-root-del { background: transparent; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .add-root-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-root-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
  .add-root-input:focus { border-color: var(--accent); }
  .settings-save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 14px 0; margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  .settings-status { font-size: 13px; color: var(--green); }

  .filter-bar { display: flex; gap: 8px; align-items: center; padding: 0 24px 12px; flex-shrink: 0; }
  .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; cursor: pointer; }

  .source-email { color: var(--accent); }
  .source-wechat { color: var(--green); }
  .source-file { color: var(--yellow); }
  .source-memory { color: #bc8cff; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div style="font-size:22px;margin-bottom:8px;">🤖</div>
  <button class="nav-btn active" onclick="switchView('chat')" id="nav-chat">
    💬<span class="tooltip">对话</span>
  </button>
  <button class="nav-btn" onclick="switchView('dashboard')" id="nav-dashboard">
    📊<span class="tooltip">状态看板</span>
  </button>
  <button class="nav-btn" onclick="switchView('memory')" id="nav-memory">
    🧠<span class="tooltip">记忆</span>
  </button>
  <button class="nav-btn" onclick="switchView('emails')" id="nav-emails">
    📧<span class="tooltip">邮件</span>
  </button>
  <button class="nav-btn" onclick="switchView('search')" id="nav-search">
    🔍<span class="tooltip">搜索</span>
  </button>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="switchView('pending')" id="nav-pending">
    ⏳<span class="tooltip">待审核</span>
  </button>
  <button class="nav-btn" onclick="switchView('settings')" id="nav-settings">
    ⚙️<span class="tooltip">设置</span>
  </button>
</div>

<!-- Main -->
<div class="main">

  <!-- ─── Chat ─── -->
  <div class="view active" id="view-chat">
    <div class="view-header">
      <div>
        <div class="view-title">Aegis</div>
        <div class="view-subtitle" id="chat-subtitle">你好，有什么需要帮忙的？</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn" onclick="clearChat()" title="清空对话">🗑️ 清空</button>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;">
          <input type="checkbox" id="use-memory" checked style="accent-color:var(--accent);"> 记忆注入
        </label>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ─── Dashboard ─── -->
  <div class="view" id="view-dashboard">
    <div class="view-header">
      <div class="view-title">📊 状态看板</div>
      <button class="btn" onclick="loadDashboard()" style="margin-left:auto;">↻ 刷新</button>
    </div>
    <div id="stat-cards" class="dashboard-grid"></div>
    <div class="dashboard-body" id="dashboard-body"></div>
  </div>

  <!-- ─── Memory ─── -->
  <div class="view" id="view-memory">
    <div class="view-header">
      <div class="view-title">🧠 记忆浏览</div>
    </div>
    <div class="memory-layout">
      <div class="memory-tree" id="memory-tree"></div>
      <div class="memory-content">
        <div id="memory-content-area" class="md-content">
          <div class="empty-state">← 从左侧选择一个记忆文件</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Emails ─── -->
  <div class="view" id="view-emails">
    <div class="view-header">
      <div class="view-title">📧 邮件</div>
    </div>
    <div class="filter-bar">
      <label style="font-size:13px;color:var(--muted);">重要度 ≥</label>
      <select class="filter-select" id="email-importance" onchange="loadEmails()">
        <option value="1" selected>全部</option>
        <option value="2">≥2</option>
        <option value="3">≥3</option>
        <option value="4">≥4</option>
        <option value="5">仅重要</option>
      </select>
      <span id="email-count" style="font-size:13px;color:var(--muted);"></span>
    </div>
    <div class="email-layout">
      <div class="email-list" id="email-list"></div>
      <div class="email-detail" id="email-detail">
        <div class="empty-state">← 从左侧选择邮件</div>
      </div>
    </div>
  </div>

  <!-- ─── Search ─── -->
  <div class="view" id="view-search">
    <div class="view-header">
      <div class="view-title">🔍 搜索</div>
    </div>
    <div class="search-container">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索邮件、微信、文件、记忆..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-btn" onclick="doSearch()">搜索</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- ─── Pending ─── -->
  <div class="view" id="view-pending">
    <div class="view-header">
      <div class="view-title">⏳ 待审核记忆</div>
      <button class="btn" onclick="loadPending()" style="margin-left:auto;">↻ 刷新</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:24px;" id="pending-list"></div>
  </div>

  <!-- ─── Settings ─── -->
  <div class="view" id="view-settings">
    <div class="view-header">
      <div class="view-title">⚙️ 系统设置</div>
      <button class="btn" onclick="loadSettings()" style="margin-left:auto;">↻ 重新加载</button>
    </div>
    <div class="settings-layout" id="settings-body">
      <div style="color:var(--muted);padding:20px;">加载中...</div>
    </div>
  </div>

</div>

<script>
// ── 状态 ────────────────────────────────────────────────────────────────────
let chatHistory = [];
let isStreaming = false;
let currentEmailPage = 0;

// ── 导航 ────────────────────────────────────────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');

  if (name === 'dashboard') loadDashboard();
  else if (name === 'memory') loadMemoryTree();
  else if (name === 'emails') loadEmails();
  else if (name === 'pending') loadPending();
  else if (name === 'settings') loadSettings();
}

// ── 聊天 ────────────────────────────────────────────────────────────────────
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
});

function renderMd(text) {
  const html = marked.parse(text, { breaks: true, gfm: true });
  return html;
}

function appendMsg(role, content, streaming = false) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '你' : '🤖';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${role === 'assistant' ? (streaming ? '<span class="loader"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>' : renderMd(content)) : escHtml(content)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  if (isStreaming) return;
  const input = chatInput.value.trim();
  if (!input) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';

  chatHistory.push({ role: 'user', content: input });
  appendMsg('user', input);

  const useMemory = document.getElementById('use-memory').checked;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  isStreaming = true;

  const bubble = appendMsg('assistant', '', true);
  let fullText = '';

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, inject_memory: useMemory }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          if (parsed.error) { bubble.textContent = '错误: ' + parsed.error; break; }
          fullText += parsed.text || '';
          bubble.innerHTML = renderMd(fullText);
          bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
          document.getElementById('chat-messages').scrollTop = 999999;
        } catch {}
      }
    }

    chatHistory.push({ role: 'assistant', content: fullText });

  } catch (e) {
    bubble.textContent = '请求失败: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    isStreaming = false;
  }
}

function clearChat() {
  chatHistory = [];
  document.getElementById('chat-messages').innerHTML = '';
}

// ── 看板 ────────────────────────────────────────────────────────────────────

function parseFocusLine(raw) {
  // raw: "🔴 任务文字  DDL 2026-05-01  来自:张三  → email:abc  [项目]  📧"
  const stripped = raw.replace(/^\s*-\s+\[[\sx]\]\s*/, '').trim();
  const parts = stripped.split(/\s{2,}/);
  const title_raw = parts[0] || '';

  let priority = 'normal', title = title_raw;
  if (title_raw.startsWith('🔴')) { priority = 'urgent';  title = title_raw.slice(2).trim(); }
  else if (title_raw.startsWith('🟡')) { priority = 'normal';  title = title_raw.slice(2).trim(); }
  else if (title_raw.startsWith('⏳')) { priority = 'waiting'; title = title_raw.slice(2).trim(); }

  let deadline = '', project = '', dbRef = '', channel = '', fromName = '';
  for (const p of parts.slice(1)) {
    const pt = p.trim();
    if (pt.startsWith('DDL '))           deadline  = pt.slice(4);
    else if (pt.startsWith('来自:'))      fromName  = pt.slice(3);
    else if (pt.startsWith('→ '))        dbRef     = pt.slice(2);
    else if (/^[a-z]+:\S+/.test(pt))     dbRef     = pt;   // email:123 wechat:xxx
    else if (pt.startsWith('[') && pt.endsWith(']')) project = pt.slice(1,-1);
    else if (pt === '📧')                channel   = 'email';
    else if (pt === '💬')                channel   = 'wechat';
    else if (pt === '✏️')               channel   = 'manual';
  }
  return { raw: stripped, title, priority, deadline, project, dbRef, channel, fromName };
}

async function loadDashboard() {
  const [status, emails, focus] = await Promise.all([
    fetch('/api/status').then(r=>r.json()).catch(()=>({})),
    fetch('/api/emails?limit=6&importance=4').then(r=>r.json()).catch(()=>({items:[]})),
    fetch('/api/memory/file?path=focus.md').then(r=>r.json()).catch(()=>({content:''})),
  ]);

  // ── stat bar (compact) ──
  const cards = document.getElementById('stat-cards');
  cards.innerHTML = [
    statCard('📧', status.emails?.important||0, '重要邮件'),
    statCard('💬', status.wechat?.messages||0, '微信消息'),
    statCard('📁', status.files?.indexed||0, '索引文件'),
    statCard('🧠', status.memory?.total_md||0, '记忆文件'),
    statCard('⏳', status.pending||0, '待审核', status.pending > 0 ? 'var(--yellow)' : null),
    statCard('👥', status.db_contacts||0, '联系人'),
  ].join('');

  // ── parse focus.md ──
  const focusLines = (focus.content||'').split('\n');
  const todoLines = focusLines.filter(l => /^\s*-\s+\[\s\]/.test(l));
  const doneLines = focusLines.filter(l => /^\s*-\s+\[x\]/i.test(l));

  const focusCards = todoLines.map((l, i) => {
    const f = parseFocusLine(l);
    const rid = `fcr-${i}`;
    const eid = `fce-${i}`;
    const chDefault = f.channel === 'wechat' ? 'wechat' : f.channel === 'email' ? 'email' : 'wechat';
    // auto-fill contact: extract from dbRef if possible (e.g. "email:from_abc" → split later)
    const autoContact = '';

    const tags = [];
    if (f.fromName) tags.push(`<span class="focus-tag ${f.channel==='email'?'tag-email':f.channel==='wechat'?'tag-wechat':''}">${f.channel==='email'?'📧':f.channel==='wechat'?'💬':'👤'} ${escHtml(f.fromName)}</span>`);
    if (f.deadline) tags.push(`<span class="focus-tag tag-ddl">⏰ ${f.deadline}</span>`);
    if (f.project)  tags.push(`<span class="focus-tag tag-project">📂 ${f.project}</span>`);

    const hasSource = !!f.dbRef;
    return `
    <div class="focus-card priority-${f.priority}" id="fc-${i}">
      <div class="focus-card-title">${escHtml(f.title)}</div>
      ${tags.length ? `<div class="focus-card-tags">${tags.join('')}</div>` : ''}
      <div class="focus-card-actions">
        ${hasSource ? `<button class="fc-btn ai" onclick="toggleFocusExpand('${eid}','${escAttr(f.dbRef)}')">📄 原文</button>` : ''}
        <button class="fc-btn reply" onclick="toggleReplyBox('${rid}')">↩ 回复</button>
        <button class="fc-btn done" onclick="focusAction('complete','${escAttr(f.title)}').then(()=>loadDashboard())">✓ 完成</button>
        <button class="fc-btn del" onclick="if(confirm('删除?'))focusAction('delete','${escAttr(f.title)}').then(()=>loadDashboard())">✕</button>
      </div>

      <!-- 回复框 -->
      <div id="${rid}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px">
          <select id="${rid}-ch" style="background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:12px;cursor:pointer;flex-shrink:0">
            <option value="wechat" ${chDefault==='wechat'?'selected':''}>微信</option>
            <option value="email" ${chDefault==='email'?'selected':''}>邮件</option>
            <option value="auto">自动</option>
          </select>
          <input id="${rid}-to" type="text" value="${escAttr(autoContact)}" placeholder="收件人（姓名/备注）"
            style="width:120px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:12px;outline:none"/>
          <input id="${rid}-msg" type="text" placeholder="核心内容，AI 自动扩写…"
            style="flex:1;min-width:140px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:12px;outline:none"
            onkeydown="if(event.key==='Enter')sendFocusReply('${escAttr(f.raw)}','${rid}')"/>
          <button onclick="sendFocusReply('${escAttr(f.raw)}','${rid}')"
            style="background:#2d6a9f;color:#fff;border:none;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:12px;flex-shrink:0">发送</button>
        </div>
        <div id="${rid}-status" style="font-size:11px;color:var(--muted);min-height:14px"></div>
      </div>

      <!-- AI解读展开区 -->
      <div class="focus-expand" id="${eid}">
        <div class="focus-ai-text" id="${eid}-content" style="color:var(--muted);font-style:italic">点击「📄 原文」加载来源内容…</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state" style="padding:40px 20px;">暂无待办焦点</div>';

  // done items (collapsed)
  const doneHtml = doneLines.length ? `
    <details style="margin-top:8px">
      <summary style="font-size:12px;color:var(--muted);cursor:pointer;padding:4px 0;">
        ✅ 已完成 ${doneLines.length} 项
      </summary>
      ${doneLines.map(l => {
        const t = l.replace(/^\s*-\s+\[x\]\s*/i,'').replace(/✓\s*\d{4}-\d{2}-\d{2}$/,'').trim();
        return `<div style="font-size:12px;color:var(--muted);padding:3px 0;text-decoration:line-through">${escHtml(t)}</div>`;
      }).join('')}
    </details>` : '';

  // ── sidebar: emails + quick tasks ──
  const emailItems = (emails.items||[]).map(e => `
    <div class="email-sidebar-item">
      <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.subject||'(无主题)')}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${escHtml((e.from_name||e.from_addr||'').slice(0,30))} · ${(e.date||'').slice(0,10)}</div>
      ${e.summary ? `<div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4">${escHtml(e.summary.slice(0,80))}…</div>` : ''}
    </div>`).join('') || '<div style="font-size:13px;color:var(--muted);padding:12px 0;">暂无重要邮件</div>';

  const tasks = [
    { name: '📬 检查邮件', id: 'check_emails' },
    { name: '📊 更新焦点', id: 'focus_update' },
    { name: '📰 生成简报', id: 'briefing' },
    { name: '🧠 邮件记忆', id: 'build_email_memory' },
    { name: '💬 微信记忆', id: 'build_wechat_memory' },
  ];

  document.getElementById('dashboard-body').innerHTML = `
    <div class="panel focus-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0">
        <div class="panel-title" style="margin-bottom:0">🎯 当前焦点 <span style="font-weight:400;color:var(--muted)">(${todoLines.length})</span></div>
        <button class="btn" style="font-size:12px;padding:3px 10px" onclick="loadDashboard()">↻</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-shrink:0">
        <input id="focus-input" type="text" placeholder="添加焦点…（自然语言，如：下周五前提交国自然）"
          style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;outline:none"
          onkeydown="if(event.key==='Enter')addFocusItem()"/>
        <button onclick="addFocusItem()" id="focus-add-btn"
          style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 12px;cursor:pointer;font-size:13px;white-space:nowrap">＋</button>
      </div>
      <div id="focus-add-status" style="font-size:12px;color:var(--muted);margin-bottom:6px;min-height:16px;flex-shrink:0"></div>
      <div class="focus-list">
        ${focusCards}
        ${doneHtml}
      </div>
    </div>
    <div class="sidebar-panel">
      <div class="panel" style="flex-shrink:0">
        <div class="panel-title">📧 重要邮件</div>
        ${emailItems}
      </div>
      <div class="panel" style="flex-shrink:0">
        <div class="panel-title">⚡ 快捷任务</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${tasks.map(t=>`<button class="btn" style="font-size:12px;padding:4px 10px" onclick="runTask('${t.id}',this)">${t.name}</button>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function statCard(icon, value, label, color) {
  return `<div class="stat-card">
    <div class="stat-icon">${icon}</div>
    <div>
      <div class="stat-value" style="${color?'color:'+color:''}">${value}</div>
      <div class="stat-label">${label}</div>
    </div>
  </div>`;
}

function toggleFocusExpand(eid, dbRef) {
  const box = document.getElementById(eid);
  if (!box) return;
  const isOpen = box.classList.contains('open');
  box.classList.toggle('open');
  if (!isOpen) {
    const content = document.getElementById(eid + '-content');
    if (content && content.dataset.loaded !== '1') {
      content.dataset.loaded = '1';
      content.textContent = '加载中…';
      fetch('/api/focus/source', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({db_ref: dbRef})
      }).then(r=>r.json()).then(d => {
        if (!d.ok) { content.textContent = d.text || '无法加载原文'; return; }
        const meta = d.source_type === 'email'
          ? `📧 ${escHtml(d.sender)} <${escHtml(d.sender_addr||'')}> · ${d.date} · 主题: ${escHtml(d.subject||'')}`
          : `💬 ${escHtml(d.sender)} · ${d.date}`;
        content.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">${meta}</div>`
          + `<div style="font-size:13px;line-height:1.6;white-space:pre-wrap">${escHtml(d.text)}</div>`;
      }).catch(() => { content.textContent = '加载失败'; });
    }
  }
}

async function runTask(id, btn) {
  const orig = btn.textContent;
  btn.textContent = '运行中...';
  btn.disabled = true;
  try {
    const r = await fetch(`/api/tasks/${id}/run`, { method: 'POST' });
    const data = await r.json();
    btn.textContent = data.ok ? '✅ 已启动' : '❌ 失败';
  } catch { btn.textContent = '❌ 错误'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
}

// ── 记忆树 ──────────────────────────────────────────────────────────────────
async function loadMemoryTree() {
  const tree = await fetch('/api/memory/tree').then(r=>r.json()).catch(()=>[]);
  const el = document.getElementById('memory-tree');
  el.innerHTML = renderTree(tree);
}

let _folderState = {};  // path -> collapsed

function renderTree(items, indent = 0) {
  return items.map(item => {
    const paddingLeft = 8 + indent * 16;
    if (item.type === 'dir') {
      const fid = 'folder-' + item.path.replace(/[^a-zA-Z0-9]/g, '_');
      const isCollapsed = _folderState[item.path] !== false; // default collapsed if not set
      _folderState[item.path] = !isCollapsed;
      const arrow = isCollapsed ? '▶' : '▼';
      const childHtml = renderTree(item.children || [], indent + 1);
      return `<div class="tree-folder" style="padding-left:${paddingLeft}px" onclick="toggleFolder('${item.path}','${fid}')">
        <span id="arrow-${fid}" style="font-size:10px;color:var(--muted)">${arrow}</span>
        📁 ${escHtml(item.name)} <span style="font-size:11px;color:var(--muted)">(${(item.children||[]).length})</span>
      </div>
      <div id="${fid}" class="tree-folder-children ${isCollapsed ? 'collapsed' : ''}">${childHtml}</div>`;
    }
    return `<div class="tree-item" style="padding-left:${paddingLeft}px" onclick="loadMemoryFile('${item.path.replace(/\\/g,'/').replace(/'/g,"\\'")}')" title="${item.name}">
      📄 ${escHtml(item.name)}
    </div>`;
  }).join('');
}

function toggleFolder(path, fid) {
  const el = document.getElementById(fid);
  const arrow = document.getElementById('arrow-' + fid);
  if (!el) return;
  const collapsed = el.classList.toggle('collapsed');
  _folderState[path] = !collapsed;
  if (arrow) arrow.textContent = collapsed ? '▶' : '▼';
}

async function loadMemoryFile(path) {
  document.querySelectorAll('.tree-item').forEach(el => {
    el.classList.toggle('active', el.onclick?.toString().includes(path));
  });
  const area = document.getElementById('memory-content-area');
  area.innerHTML = '<div style="color:var(--muted);padding:20px;">加载中...</div>';
  try {
    const data = await fetch(`/api/memory/file?path=${encodeURIComponent(path)}`).then(r=>r.json());
    const isFocus = path.includes('focus.md');
    if (isFocus) {
      area.innerHTML = renderFocusMd(data.content || '');
    } else {
      area.innerHTML = renderMd(data.content || '(空文件)');
      area.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    }
  } catch (e) {
    area.innerHTML = `<div style="color:var(--red);">加载失败: ${e.message}</div>`;
  }
}

function renderFocusMd(content) {
  // 顶部固定输入框
  const inputBar = `
    <div style="display:flex;gap:6px;margin-bottom:12px;padding:10px;
                background:var(--panel);border-radius:8px;border:1px solid var(--border)">
      <input id="focus-mem-input" type="text"
        placeholder="添加焦点…（支持自然语言，如：明天截止的国自然修改）"
        style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);
               border-radius:6px;padding:7px 10px;font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter')addFocusFromMemory()"
      />
      <button onclick="addFocusFromMemory()" id="focus-mem-btn"
        style="background:var(--accent);color:#fff;border:none;border-radius:6px;
               padding:7px 14px;cursor:pointer;font-size:13px;white-space:nowrap">
        ＋ 添加
      </button>
    </div>
    <div id="focus-mem-status" style="font-size:12px;color:var(--muted);margin-bottom:8px;min-height:16px"></div>`;
  // 渲染 focus.md，给每个 - [ ] 条目加上勾选和删除按钮
  const lines = content.split('\n');
  const html = lines.map(line => {
    const todoMatch = line.match(/^(\s*)-\s+\[( |x)\]\s+(.+)$/);
    if (todoMatch) {
      const done = todoMatch[2] === 'x';
      const text = todoMatch[3];
      const indent = todoMatch[1].length * 8;
      const textDisplay = done
        ? `<span style="text-decoration:line-through;color:var(--muted)">${escHtml(text)}</span>`
        : `<span>${escHtml(text)}</span>`;
      const btns = done ? '' : `
        <span style="margin-left:8px;white-space:nowrap">
          <button onclick="focusAction('complete','${escAttr(text)}')"
            style="background:var(--accent);color:#fff;border:none;border-radius:4px;
                   padding:2px 8px;cursor:pointer;font-size:11px;margin-right:4px">✓ 完成</button>
          <button onclick="focusAction('delete','${escAttr(text)}')"
            style="background:#c0392b;color:#fff;border:none;border-radius:4px;
                   padding:2px 8px;cursor:pointer;font-size:11px">✕ 删除</button>
        </span>`;
      return `<div style="display:flex;align-items:center;padding:5px 0;
                          padding-left:${indent}px;border-bottom:1px solid var(--border)">
                ${done ? '☑' : '☐'}&nbsp;${textDisplay}${btns}
              </div>`;
    }
    // 普通行（标题、空行等）
    if (line.startsWith('#')) {
      const lvl = line.match(/^(#+)/)[1].length;
      const text = line.replace(/^#+\s*/, '');
      const sz = ['2em','1.5em','1.2em'][Math.min(lvl-1,2)];
      return `<div style="font-size:${sz};font-weight:bold;margin-top:16px;margin-bottom:6px">${escHtml(text)}</div>`;
    }
    if (line.trim().startsWith('>')) {
      return `<div style="color:var(--muted);font-size:12px;margin-bottom:4px">${escHtml(line.replace(/^>\s*/,''))}</div>`;
    }
    return line.trim() ? `<div style="padding:3px 0">${escHtml(line)}</div>` : '<div style="height:6px"></div>';
  }).join('');
  return `<div style="padding:8px 4px">${inputBar}${html}</div>`;
}

function escAttr(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

async function addFocusFromMemory() {
  const input  = document.getElementById('focus-mem-input');
  const btn    = document.getElementById('focus-mem-btn');
  const status = document.getElementById('focus-mem-status');
  const text   = (input?.value || '').trim();
  if (!text) return;

  if (btn)    { btn.disabled = true; btn.textContent = 'AI解析中…'; }
  if (status) status.textContent = '🤖 AI 正在解析…';

  try {
    const r = await fetch('/api/focus/add', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, ai_parse: true}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.status);

    if (input) input.value = '';
    const p = data.parsed || {};
    const sectionName = data.section?.replace('## ','') || '常规';
    const extra = [
      p.deadline ? `截止 ${p.deadline}` : '',
      p.project  ? `[${p.project}]` : '',
    ].filter(Boolean).join(' ');
    if (status) status.textContent = `✅ 已加入「${sectionName}」${extra ? ' — ' + extra : ''}`;

    setTimeout(() => loadMemoryFile('focus.md'), 300);
  } catch(e) {
    if (status) status.textContent = `❌ 失败: ${e.message}`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '＋ 添加'; }
  }
}

function toggleReplyBox(rid) {
  const box = document.getElementById(rid);
  if (!box) return;
  const visible = box.style.display !== 'none';
  box.style.display = visible ? 'none' : 'block';
  if (!visible) setTimeout(() => document.getElementById(rid + '-msg')?.focus(), 50);
}

async function sendFocusReply(text, rid) {
  const channel = document.getElementById(rid + '-ch')?.value || 'wechat';
  const contact = document.getElementById(rid + '-to')?.value?.trim();
  const msg = document.getElementById(rid + '-msg')?.value?.trim();
  const status = document.getElementById(rid + '-status');
  if (!contact) { if (status) status.textContent = '请填写收件人'; document.getElementById(rid+'-to')?.focus(); return; }
  if (!msg) { if (status) status.textContent = '请输入回复内容'; return; }

  const btn = document.querySelector(`#${rid} button[onclick*="sendFocusReply"]`);
  if (btn) { btn.disabled = true; btn.textContent = '发送中…'; }
  if (status) status.textContent = 'AI 扩写并发送中…';

  try {
    const r = await fetch('/api/focus/reply', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ focus_text: text, contact, channel, core_message: msg })
    });
    const data = await r.json();
    if (status) status.textContent = data.result || (r.ok ? '✅ 已发送' : '❌ 失败');
    if (r.ok && data.result?.includes('✅')) {
      setTimeout(() => loadDashboard(), 1500);
    }
  } catch (e) {
    if (status) status.textContent = '❌ 请求失败: ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '发送'; }
  }
}

      </div>

      <!-- 通知 -->
      <div class="settings-section">
        <div class="settings-section-title">🔔 通知设置</div>
        <div class="settings-row">
          <div><div class="settings-label">推送邮箱</div><div class="settings-hint">接收通知的邮件地址</div></div>
          <input class="settings-input wide" type="email" id="ntf-push_email" value="${escHtml(ntf.push_email ?? '')}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">邮件重要度阈值</div><div class="settings-hint">≥ 此值才即时推送</div></div>
          <input class="settings-input" type="number" min="1" max="5" id="ntf-urgent_importance" value="${ntf.urgent_importance ?? 4}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">开启日报</div></div>
          <label class="settings-toggle">
            <input type="checkbox" id="ntf-briefing_enabled" ${ntf.briefing_enabled !== false ? 'checked' : ''} onchange="markDirty()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <div><div class="settings-label">开启周报</div></div>
          <label class="settings-toggle">
            <input type="checkbox" id="ntf-weekly_report_enabled" ${ntf.weekly_report_enabled !== false ? 'checked' : ''} onchange="markDirty()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <div><div class="settings-label">同步失败告警</div><div class="settings-hint">连续失败 N 次后发邮件</div></div>
          <label class="settings-toggle">
            <input type="checkbox" id="ntf-alert_on_sync_failure" ${ntf.alert_on_sync_failure !== false ? 'checked' : ''} onchange="markDirty()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <div><div class="settings-label">告警触发次数</div><div class="settings-hint">连续失败几次才告警</div></div>
          <input class="settings-input" type="number" min="1" max="10" id="ntf-sync_failure_threshold" value="${ntf.sync_failure_threshold ?? 3}" onchange="markDirty()">
        </div>
      </div>

      <!-- AI 参数 -->
      <div class="settings-section">
        <div class="settings-section-title">🤖 AI 参数</div>
        <div class="settings-row">
          <div><div class="settings-label">使用模型</div><div class="settings-hint">endpoint ID 或模型名</div></div>
          <input class="settings-input wide" id="ai-model" value="${escHtml(ai.model ?? '')}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">日报最大字数</div></div>
          <input class="settings-input" type="number" min="100" max="2000" id="ai-briefing_max_chars" value="${ai.briefing_max_chars ?? 400}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">日报质量门槛</div><div class="settings-hint">< 此分触发 AI 重写</div></div>
          <input class="settings-input" type="number" step="0.5" min="1" max="10" id="ai-daily_score_threshold" value="${ai.daily_score_threshold ?? 7}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">摘要最大 Token</div><div class="settings-hint">单封邮件/消息摘要上限</div></div>
          <input class="settings-input" type="number" min="50" max="1000" id="ai-summary_max_tokens" value="${ai.summary_max_tokens ?? 300}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">规则评分优先</div><div class="settings-hint">日报先用规则打分，节省 token</div></div>
          <label class="settings-toggle">
            <input type="checkbox" id="ai-briefing_rule_check" ${ai.briefing_rule_check !== false ? 'checked' : ''} onchange="markDirty()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <div><div class="settings-label">自动提取焦点</div><div class="settings-hint">从邮件/微信提取行动项</div></div>
          <label class="settings-toggle">
            <input type="checkbox" id="ai-focus_extract_enabled" ${ai.focus_extract_enabled !== false ? 'checked' : ''} onchange="markDirty()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 记忆管理 -->
      <div class="settings-section">
        <div class="settings-section-title">🧠 记忆管理</div>
        <div class="settings-row">
          <div><div class="settings-label">焦点最大条目</div><div class="settings-hint">focus.md 活跃项上限</div></div>
          <input class="settings-input" type="number" min="5" max="50" id="mem-focus_max_active" value="${mem.focus_max_active ?? 20}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">联系人档案上限</div><div class="settings-hint">people.md 最多几人</div></div>
          <input class="settings-input" type="number" min="5" max="50" id="mem-people_md_limit" value="${mem.people_md_limit ?? 20}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">焦点去重阈值</div><div class="settings-hint">相似度 0-1，超过则视为重复</div></div>
          <input class="settings-input" type="number" step="0.05" min="0.3" max="1" id="mem-focus_dedup_threshold" value="${mem.focus_dedup_threshold ?? 0.6}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">Pending 过期天数</div><div class="settings-hint">超过 N 天自动 expired</div></div>
          <input class="settings-input" type="number" min="7" max="90" id="mem-pending_expire_days" value="${mem.pending_expire_days ?? 30}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">活跃联系人 Top N</div><div class="settings-hint">每次刷新取前几个联系人</div></div>
          <input class="settings-input" type="number" min="10" max="100" id="mem-contact_top_n" value="${mem.contact_top_n ?? 30}" onchange="markDirty()">
        </div>
      </div>

      <!-- Web 服务 -->
      <div class="settings-section">
        <div class="settings-section-title">🌐 Web 服务</div>
        <div class="settings-row">
          <div><div class="settings-label">监听端口</div><div class="settings-hint">重启后生效</div></div>
          <input class="settings-input" type="number" min="1024" max="65535" id="web-port" value="${web.port ?? 8077}" onchange="markDirty()">
        </div>
        <div class="settings-row">
          <div><div class="settings-label">系统名称</div></div>
          <input class="settings-input" id="web-title" value="${escHtml(web.title ?? 'Aegis')}" onchange="markDirty()">
        </div>
      </div>

      <!-- 扫描目录 -->
      <div class="settings-section full-width">
        <div class="settings-section-title">📁 扫描目录</div>
        <div class="scan-root-list" id="scan-root-list">${roots}</div>
        <div class="add-root-row">
          <input class="add-root-input" id="new-root-input" placeholder="输入文件夹路径，如 C:/Users/me/Documents" onkeydown="if(event.key==='Enter')addScanRoot()">
          <button class="btn btn-primary" onclick="addScanRoot()">＋ 添加</button>
        </div>
      </div>

      <!-- 功能模块开关 -->
      <div class="settings-section full-width">
        <div class="settings-section-title">🔌 功能模块</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0 24px;">
          ${moduleRows}
        </div>
      </div>

    </div>

    <div class="settings-save-bar">
      <button class="btn btn-primary" id="settings-save-btn" onclick="saveSettings()" disabled>保存设置</button>
      <span class="settings-status" id="settings-status"></span>
    </div>
  `;
}

function markDirty() {
  const btn = document.getElementById('settings-save-btn');
  const st = document.getElementById('settings-status');
  if (btn) btn.disabled = false;
  if (st) st.textContent = '';
}

function _getVal(id, type) {
  const el = document.getElementById(id);
  if (!el) return undefined;
  if (el.type === 'checkbox') return el.checked;
  if (type === 'number') return parseFloat(el.value) || 0;
  if (type === 'int') return parseInt(el.value) || 0;
  return el.value;
}

async function saveSettings() {
  const btn = document.getElementById('settings-save-btn');
  const st = document.getElementById('settings-status');
  btn.disabled = true;
  st.textContent = '保存中...';
  st.style.color = 'var(--muted)';

  // gather module toggles
  const modules = {};
  for (const [k] of Object.entries((_settingsData?.modules) || {})) {
    const el = document.getElementById('mod-' + k);
    if (el) modules[k] = el.checked;
  }

  const payload = {
    user: {
      owner_name:      _getVal('usr-owner_name'),
      owner_full_name: _getVal('usr-owner_full_name'),
      owner_en_name:   _getVal('usr-owner_en_name'),
      aegis_wxid:      _getVal('usr-aegis_wxid'),
    },
    api: {
      volc_api_key:  _getVal('api-volc_api_key'),   // 空=不修改
      volc_api_base: _getVal('api-volc_api_base'),
      volc_model:    _getVal('api-volc_model'),
    },
    email_163: {
      email:     _getVal('e163-email'),
      auth_code: _getVal('e163-auth_code'),          // 空=不修改
      imap_host: _getVal('e163-imap_host'),
      imap_port: _settingsData?.email_163?.imap_port ?? 993,
      smtp_host: _getVal('e163-smtp_host'),
      smtp_port: _settingsData?.email_163?.smtp_port ?? 465,
    },
    email_gmail: {
      email:        _getVal('egmail-email'),
      app_password: _getVal('egmail-app_password'),  // 空=不修改
      imap_host:    _getVal('egmail-imap_host'),
      imap_port:    _settingsData?.email_gmail?.imap_port ?? 993,
      smtp_host:    _getVal('egmail-smtp_host'),
      smtp_port:    _settingsData?.email_gmail?.smtp_port ?? 587,
    },
    scan: { roots: _settingsData?.scan?.roots || [] },
    schedule: {
      briefing_hour:           _getVal('sch-briefing_hour','int'),
      briefing_minute:         _settingsData?.schedule?.briefing_minute ?? 0,
      rss_hour:                _getVal('sch-rss_hour','int'),
      focus_update_hour:       _getVal('sch-focus_update_hour','int'),
      profile_update_hour:     _getVal('sch-profile_update_hour','int'),
      email_check_minutes:     _getVal('sch-email_check_minutes','int'),
      wechat_sync_minutes:     _getVal('sch-wechat_sync_minutes','int'),
      wechat_contacts_minutes: _getVal('sch-wechat_contacts_minutes','int'),
      weekly_report_day:       _getVal('sch-weekly_report_day'),
      weekly_report_hour:      _getVal('sch-weekly_report_hour','int'),
    },
    notify: {
      push_email:              _getVal('ntf-push_email'),
      urgent_importance:       _getVal('ntf-urgent_importance','int'),
      briefing_enabled:        _getVal('ntf-briefing_enabled'),
      weekly_report_enabled:   _getVal('ntf-weekly_report_enabled'),
      alert_on_sync_failure:   _getVal('ntf-alert_on_sync_failure'),
      sync_failure_threshold:  _getVal('ntf-sync_failure_threshold','int'),
    },
    memory: {
      focus_max_active:       _getVal('mem-focus_max_active','int'),
      people_md_limit:        _getVal('mem-people_md_limit','int'),
      focus_dedup_threshold:  _getVal('mem-focus_dedup_threshold','number'),
      pending_expire_days:    _getVal('mem-pending_expire_days','int'),
      contact_top_n:          _getVal('mem-contact_top_n','int'),
      group_top_n:            _settingsData?.memory?.group_top_n ?? 15,
    },
    modules,
    wechat: _settingsData?.wechat || {},
    ai: {
      model:                  _getVal('ai-model'),
      briefing_max_chars:     _getVal('ai-briefing_max_chars','int'),
      daily_score_threshold:  _getVal('ai-daily_score_threshold','number'),
      summary_max_tokens:     _getVal('ai-summary_max_tokens','int'),
      briefing_rule_check:    _getVal('ai-briefing_rule_check'),
      focus_extract_enabled:  _getVal('ai-focus_extract_enabled'),
    },
    web: {
      port:  _getVal('web-port','int'),
      title: _getVal('web-title'),
    },
  };

  try {
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());
    _settingsData = payload;
    st.textContent = '✅ 已保存';
    st.style.color = 'var(--green)';
    setTimeout(() => { if (st) st.textContent = ''; }, 3000);
  } catch(e) {
    st.textContent = '❌ 保存失败: ' + e.message;
    st.style.color = 'var(--red)';
    btn.disabled = false;
  }
}

async function addScanRoot() {
  const input = document.getElementById('new-root-input');
  const path = (input?.value || '').trim();
  if (!path) return;
  try {
    const r = await fetch('/api/settings/scan-roots', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path}),
    });
    if (!r.ok) { const e = await r.json(); alert('添加失败: ' + (e.detail||r.status)); return; }
    _settingsData = await r.json();
    input.value = '';
    renderSettings(_settingsData);
  } catch(e) { alert('请求失败: ' + e.message); }
}

async function removeScanRoot(path) {
  if (!confirm(`确认移除扫描目录：\n${path}？`)) return;
  try {
    const r = await fetch('/api/settings/scan-roots', {
      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path}),
    });
    if (!r.ok) { const e = await r.json(); alert('删除失败: ' + (e.detail||r.status)); return; }
    _settingsData = await r.json();
    renderSettings(_settingsData);
  } catch(e) { alert('请求失败: ' + e.message); }
}

// ── 初始化 ──────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  // 加载状态并更新subtitle
  try {
    const s = await fetch('/api/status').then(r=>r.json());
    document.getElementById('chat-subtitle').textContent =
      `${s.emails?.total||0} 封邮件 · ${s.wechat?.chats||0} 个微信会话 · ${s.memory?.total_md||0} 个记忆文件`;
  } catch {}
  // 打招呼
  appendMsg('assistant', `你好！我是Aegis，你的私人AI助理。\n\n我已加载你的个人背景、邮件摘要和微信活跃记录。有什么需要帮忙的？`);
});
</script>
</body>
</html>
